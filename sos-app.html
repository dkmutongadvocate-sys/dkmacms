<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DKMA SOS App Download</title>
  <meta name="theme-color" content="#0D1B2A" />
  <style>
    :root{
      --navy:#0D1B2A;
      --gold:#B8953A;
      --cream:#F7F4ED;
      --txt:#1F2937;
      --muted:#6B7280;
      --line:#DDD5C5;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#0D1B2A 0%,#13283d 100%);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(100%,520px);
      background:#fff;
      color:var(--txt);
      border-radius:18px;
      padding:28px 24px;
      box-shadow:0 24px 80px rgba(0,0,0,0.28);
      border:1px solid rgba(184,149,58,0.22);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background:#FFF5E1;
      color:#7A4A00;
      font-size:11px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
    }
    h1{
      margin:16px 0 8px;
      font-size:28px;
      line-height:1.15;
      color:var(--navy);
      font-family:Georgia,serif;
      font-weight:600;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }
    .status{
      margin-top:18px;
      padding:16px 18px;
      border-radius:14px;
      background:var(--cream);
      border:1px solid var(--line);
      color:var(--txt);
      font-size:14px;
      line-height:1.6;
    }
    .actions{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:160px;
    }
    .btn.primary{
      background:var(--navy);
      color:#fff;
    }
    .btn.secondary{
      background:#fff;
      color:var(--txt);
      border:1px solid var(--line);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">DKMA SOS</div>
    <h1>Download the SOS app</h1>
    <p>Install the official DKMA SOS app to activate your emergency button, enter your code, and stay ready in one place.</p>
    <div class="status" id="status">Checking the latest release...</div>
    <div class="actions">
      <a class="btn primary" id="download-btn" href="#" style="display:none" rel="noopener">Download App</a>
      <button class="btn secondary" id="retry-btn" type="button" style="display:none">Try Again</button>
    </div>
  </div>
  <script>
    const RELEASE_ENDPOINT='https://oolqcrpjuqmzxupaozpu.supabase.co/functions/v1/panic-app-release?versionCode=0';
    const statusEl=document.getElementById('status');
    const downloadBtn=document.getElementById('download-btn');
    const retryBtn=document.getElementById('retry-btn');

    async function loadRelease(autoOpen=true){
      statusEl.textContent='Checking the latest release...';
      downloadBtn.style.display='none';
      retryBtn.style.display='none';
      try{
        const res=await fetch(RELEASE_ENDPOINT,{method:'GET'});
        const data=await res.json().catch(()=>({}));
        if(!res.ok)throw new Error(data?.error||'Could not check the published SOS app release.');
        const url=String(data?.downloadUrl||'').trim();
        const release=data?.release||null;
        if(!url || !release){
          statusEl.textContent='There is no published SOS app release available right now.';
          retryBtn.style.display='inline-flex';
          return;
        }
        const versionLabel=release?.versionName ? `Version ${release.versionName}` : 'Latest release';
        statusEl.textContent=`${versionLabel} is ready. Your download should begin automatically. If it does not, use the button below.`;
        downloadBtn.href=url;
        downloadBtn.download=release?.fileName||'dkma-panic.apk';
        downloadBtn.style.display='inline-flex';
        retryBtn.style.display='inline-flex';
        if(autoOpen)window.location.href=url;
      }catch(err){
        statusEl.textContent=err?.message||'Could not load the SOS app release.';
        retryBtn.style.display='inline-flex';
      }
    }

    retryBtn.addEventListener('click',()=>loadRelease(false));
    loadRelease(true);
  </script>
</body>
</html>
